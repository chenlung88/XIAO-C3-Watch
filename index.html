<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XIAO C3 Watch 線上燒錄</title>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background-color: #f4f4f4; }
        .box { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        button { cursor: pointer; padding: 10px 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>😃 XIAO C3 Watch 一鍵燒錄</h1>
        <h2  style="background-color:DodgerBlue;">👍 新北市泰山高中電子科王順泰/陳致中老師教學專用</h2>
        <h3 style="color:Tomato;" >Round Display for Seeed Studio XIAO 搭配  XIAO ESP32 C3/S3均可使用</h3>
        <h3 style="color:Tomato;">圓形顯示器新版中央新增了一個 2 位元開關，用於控制螢幕背光和電池電壓讀數</h3>
        <h3 style="color:Green;">註：範例使用的 Wi-Fi 帳密為 TSSH/12345678，連線成功才會自動更新網路時間</h3>
        <img src="XIAO_C3_Watch.jpg" />
        <p>請使用 Chrome 瀏覽器並連接您的開發板</p>
        <esp-web-install-button manifest="./manifest.json">
            <button slot="activate">開始連線並更新</button>
        </esp-web-install-button>
    </div>
</body>
</html>

上述範例所使用的Wi-Fi帳密均為 TSSH/12345678
